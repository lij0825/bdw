<!doctype html>
<html lang="ko">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>BDW BAND LIVE PERFORMANCE</title>
    <style>
      * {
        margin: 0;
        padding: 0;
        box-sizing: border-box;
      }

      body {
        font-family: "Segoe UI", Tahoma, Geneva, Verdana, sans-serif;
        background-color: #000;
        min-height: 100vh;
        overflow: hidden;
      }

      .container {
        position: relative;
        width: 100vw;
        height: 100vh;
        display: flex;
        align-items: center;
        justify-content: center;
      }

      .main-image {
        position: absolute;
        top: 0;
        left: 0;
        width: 100%;
        height: 100%;
        object-fit: cover;
        z-index: 1;
      }

      .google-form-button {
        position: relative;
        z-index: 2;
        display: inline-block;
        background: linear-gradient(135deg, #0f5792 0%, #38abee 100%);
        color: white;
        padding: 20px 50px;
        text-decoration: none;
        font-size: 1.3em;
        font-weight: bold;
        border-radius: 50px;
        box-shadow: 0 10px 30px rgba(25, 50, 88, 0.4);
        transition: all 0.3s ease;
        text-transform: uppercase;
        letter-spacing: 2px;
        margin-top: 50vh;
      }

      .google-form-button:hover {
        transform: translateY(-5px);
        box-shadow: 0 15px 40px rgba(0, 83, 138, 0.6);
        background: linear-gradient(135deg, #004b7c 0%, #4db8ff 100%);
      }

      .google-form-button:active {
        transform: translateY(-2px);
      }

      @media (max-width: 480px) {
        .main-image {
          object-fit: contain;
        }

        .google-form-button {
          padding: 12px 25px;
          font-size: 0.9em;
          margin-top: 45vh;
          letter-spacing: 1px;
        }
      }

      @media (min-width: 481px) and (max-width: 768px) {
        .main-image {
          object-fit: contain;
        }

        .google-form-button {
          padding: 15px 35px;
          font-size: 1.1em;
          margin-top: 48vh;
        }
      }

      @media (min-width: 769px) and (max-width: 1024px) {
        .google-form-button {
          padding: 18px 45px;
          font-size: 1.2em;
          margin-top: 50vh;
        }
      }

      @media (orientation: landscape) and (max-height: 600px) {
        .google-form-button {
          padding: 10px 20px;
          font-size: 0.9em;
          margin-top: 20vh;
        }
      }
    </style>
  </head>
  <body>
    <div class="container">
      <img src="/images/bdw_main.jpg" alt="BDW BAND LIVE PERFORMANCE" class="main-image" />

      <a
        href="https://docs.google.com/forms/d/e/1FAIpQLSdJ1Wcw5jQYN73wMbiGSr0kG9Xg2pwxcPz0HJlKCd-yqc5c3A/viewform?usp=publish-editor"
        target="_blank"
        class="google-form-button"
      >
        📝 예매하기
      </a>
    </div>
  </body>
</html>
