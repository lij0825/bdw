<!doctype html>
<html lang="ko">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>BDW BAND LIVE PERFORMANCE</title>
    <style>
      * {
        margin: 0;
        padding: 0;
        box-sizing: border-box;
      }

      body {
        font-family: "Segoe UI", Tahoma, Geneva, Verdana, sans-serif;
        background-color: #000;
        min-height: 100vh;
        overflow: auto;
        display: flex;
        align-items: center;
        justify-content: center;
      }

      .container {
        position: relative;
        width: 100%;
        max-width: 100vw;
        max-height: 100vh;
        aspect-ratio: 768 / 1024;
        margin: auto;
        font-size: calc(1vw + 1vh);
      }

      .image-wrapper {
        position: relative;
        width: 100%;
        height: 100%;
      }

      .main-image {
        width: 100%;
        height: 100%;
        object-fit: contain;
        display: block;
      }

      .google-form-button {
        position: absolute;
        left: 50%;
        top: 75%;
        transform: translate(-50%, -50%);
        z-index: 2;
        display: inline-block;
        background: transparent;
        color: rgb(0, 0, 0);
        padding: 1em 2.5em;
        text-decoration: none;
        font-size: 1em;
        font-weight: bold;
        border-radius: 2.5em;
        box-shadow: none;
        transition: all 0.3s ease;
        text-transform: uppercase;
        letter-spacing: 0.1em;
        white-space: nowrap;
      }

      .google-form-button:hover {
        transform: translate(-50%, -50%) scale(1.1);
      }

      .google-form-button:active {
        transform: translate(-50%, -50%) scale(1.05);
      }

      @media (max-width: 480px) {
        .container {
          font-size: calc(1.2vw + 1.2vh);
        }
      }

      @media (min-width: 481px) and (max-width: 768px) {
        .container {
          font-size: calc(1.1vw + 1.1vh);
        }
      }

      @media (orientation: landscape) and (max-height: 600px) {
        .container {
          max-height: 95vh;
          font-size: calc(1.3vw + 1.3vh);
        }
      }

      @media (min-aspect-ratio: 768/1024) {
        .container {
          width: auto;
          height: 100vh;
        }
      }

      @media (max-aspect-ratio: 768/1024) {
        .container {
          width: 100vw;
          height: auto;
        }
      }
    </style>
  </head>
  <body>
    <div class="container">
      <div class="image-wrapper">
        <img src="/images/bdw_main.jpg" alt="BDW BAND LIVE PERFORMANCE" class="main-image" />

        <a
          href="https://docs.google.com/forms/d/e/1FAIpQLSdJ1Wcw5jQYN73wMbiGSr0kG9Xg2pwxcPz0HJlKCd-yqc5c3A/viewform?usp=publish-editor"
          target="_blank"
          class="google-form-button"
        >
          📝 예매하기
        </a>
      </div>
    </div>
  </body>
</html>
