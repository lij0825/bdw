<!doctype html>
<html lang="ko">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>BDW BAND LIVE PERFORMANCE</title>
    <link rel="icon" type="image/jpeg" href="Favicon.jpg" />
    <style>
      * {
        margin: 0;
        padding: 0;
        box-sizing: border-box;
      }

      body {
        background-color: #009ee2;
        min-height: 100vh;
        display: flex;
        justify-content: center;
        align-items: flex-start;
        padding: 20px 0;
      }

      main {
        width: 100%;
        max-width: 1200px;
        display: flex;
        flex-direction: column;
        align-items: center;
        gap: 0;
      }

      .poster-image,
      .booking-button,
      .lineup-image {
        max-width: 100%;
        height: auto;
        display: block;
      }

      .poster-image {
        width: 100%;
      }

      .booking-link {
        display: block;
        margin: 40px 0;
        transition: transform 0.3s ease;
      }

      .booking-link:hover {
        transform: scale(1.05);
      }

      .booking-link:active {
        transform: scale(0.98);
      }

      .booking-button {
        width: 100%;
        cursor: pointer;
      }

      .lineup-image {
        width: 100%;
        margin-top: 40px;
      }

      @media (max-width: 768px) {
        body {
          padding: 10px 0;
        }

        .booking-link {
          margin: 30px 0;
        }

        .lineup-image {
          margin-top: 30px;
        }
      }

      @media (max-width: 480px) {
        body {
          padding: 5px 0;
        }

        .booking-link {
          margin: 20px 0;
        }

        .lineup-image {
          margin-top: 20px;
        }
      }
    </style>
  </head>
  <body>
    <main>
      <img src="images/BDW-post.jpg" alt="BDW 라이브 공연 메인 포스터" class="poster-image" />

      <a
        href="https://docs.google.com/forms/d/e/1FAIpQLSdJ1Wcw5jQYN73wMbiGSr0kG9Xg2pwxcPz0HJlKCd-yqc5c3A/viewform?usp=publish-editor"
        target="_blank"
        rel="noopener noreferrer"
        class="booking-link"
      >
        <img src="images/booking-link.png" alt="예매하기 버튼" class="booking-button" />
      </a>

      <img src="images/lineup-notice.png" alt="상세 라인업 안내" class="lineup-image" />
    </main>
  </body>
</html>
